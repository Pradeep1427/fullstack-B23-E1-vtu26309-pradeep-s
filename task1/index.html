<!DOCTYPE html>

<html>
<head>
    <title>Student Registration</title>
</head>
<link rel="stylesheet" href="main.css"/>
<body>

<center>
    <h1>Vel Tech University</h1>
    <h6>School | College | Hospitals</h6>
    <p>Welcome to our College</p>
</center>

<hr>

<center>
    <h2>Registration Form</h2>
<form>
    <table border="1" cellpadding="8">

        <tr>
            <td>Name:</td>
            <td><input type="text" placeholder="Enter your Name"></td>
        </tr>

        <tr>
            <td>VTU No:</td>
            <td><input type="number" placeholder="Enter your Number"></td>
        </tr>

        <tr>
            <td>Reg No:</td>
            <td><input type="number" placeholder="Enter your Reg No"></td>
        </tr>

        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female

            </td>
        </tr>

        <tr>
            <td>Email:</td>
            <td><input type="email" placeholder="Enter your Email"></td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Register">
            </td>
        </tr>

    </table>
</form>

</center>

</body>
</html>
